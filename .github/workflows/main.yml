name: Quantum V8.0 Runner

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/5 * * * *' # Jalan otomatis tiap 5 menit
  workflow_dispatch: # Biar lu bisa klik "Run" manual

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Biar GitHub bisa nge-save data hasil malingan ke repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Running Quantum Script
        run: |
          # Pastiin file script_maut.py ada di repo lu!
          python script_maut.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Arulmodss-Quantum"
          git config --global user.email "arul@quantum.dev"
          git add .
          git commit -m "Update logs: $(date)" || exit 0
          git push
